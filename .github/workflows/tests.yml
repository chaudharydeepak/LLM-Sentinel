name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt httpx pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -q --cov=llm_sentinel --cov-report=term-missing --cov-config=.coveragerc --cov-fail-under=80
